<!DOCTYPE html>
<html>
<head>
    <title>Mall Aserri</title>
    <link rel="stylesheet" href="disenos.css">
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="image.png">
    
    <style>
        .linea-encabezado {
          border: none;
           height: 8px;
         background-color: #0062ff;
        position: fixed;   
         top: 0;          
        left: 0;          
          width: 100vw;     
         margin: 0;         
        z-index: 1000;
        }
        img {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 80px;
        }
        h1 {
            color: #0062ff;
        }
    </style>
</head>
<body>
    <header>
        <h1></h1>
        <hr class="linea-encabezado">
    </header>

    <img src="image.png" alt="imagen">
    
 <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form action="Principal.html" method="post">
      <div class="input-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>
  </div>


  <div class="register-box">
    <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
  </div>


</body>
</html>
